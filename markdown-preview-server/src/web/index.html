<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Markdown Preview</title>
<link rel="stylesheet" href="/app.css">
</head>
<body>
<header id="topbar">
  <div id="title">Markdown Preview</div>
  <div id="controls">
    <button id="theme-toggle" aria-label="Toggle theme">☾</button>
    <button id="width-toggle" aria-label="Toggle width">
      <svg viewBox="0 0 20 20" aria-hidden="true"><path d="M5 5h10M5 10h10M5 15h10" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>
      <span>Comfortable</span>
    </button>
    <button id="finish-top" class="btn">Finish</button>
  </div>
</header>
<main id="doc"></main>
<footer id="bottombar">
  <div id="stats"></div>
  <button id="finish-bottom" class="btn">Finish</button>
</footer>
<script type="module" src="/app.js"></script>
</body>
</html>
