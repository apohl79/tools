# Layer 7: Cmux Fork (personal cmux build)
[layer7]
name = "Cmux Fork"
repo = "git@github.com:apohl79/cmux.git"
clone_path = "{home}/workspace/code/cmux"
branch = "local/all-features"
install_target = "/Applications/cmux.app"
# Script inside the cloned repo that builds + installs cmux.app.
install_script = "scripts/install-fork.sh"
