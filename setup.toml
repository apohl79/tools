# Claude Code marketplaces and plugins.
# Requires the `claude` brew package above; install_claude_code() will
# add each marketplace and install each plugin, skipping any already present.
[layer2.claude_code]
marketplaces = [
    "andreas-pohl-parloa/my-coding",
    "andreas-pohl-parloa/plan-executor-plugin",
]
plugins = [
    "my@my-coding",
    "plan-executor@plan-executor",
]

# Claude Code settings.json patches (deep-merged into ~/.claude/settings.json)
[layer2.claude_code.settings.statusLine]
type = "command"
command = "~/.claude/statusline.sh"
padding = 0

# Layer 3: GitHub CLI authentication
[layer3]
name = "GitHub Authentication"

# Layer 4: Emacs installation
[layer4]
name = "Emacs Installation"
formula = "emacs-plus@31"
options = [
    "--with-mailutils",
    "--with-xwidgets",
]

# Post-install commands to run after Emacs is installed
post_install_commands = [
]

# Spelling dictionaries to download
[[layer4.dictionaries]]
filename = "de_DE_frami.aff"
url = "https://github.com/LibreOffice/dictionaries/raw/refs/heads/master/de/de_DE_frami.aff"

[[layer4.dictionaries]]
filename = "de_DE_frami.dic"
url = "https://github.com/LibreOffice/dictionaries/raw/refs/heads/master/de/de_DE_frami.dic"

[[layer4.dictionaries]]
filename = "en_US.aff"
url = "https://github.com/LibreOffice/dictionaries/raw/refs/heads/master/en/en_US.aff"

[[layer4.dictionaries]]
filename = "en_US.dic"
url = "https://github.com/LibreOffice/dictionaries/raw/refs/heads/master/en/en_US.dic"

# Layer 5: Doom Emacs
[layer5]
name = "Emacs Setup"
repo = "https://github.com/doomemacs/doomemacs"
install_path = "{home}/.config/emacs"

# Commands to run after Doom installation/sync
# "brew services start d12frosted/emacs-plus/emacs-plus@31",
post_install_commands = [
]

# Emacs configuration symlinks (chosen during setup)
[layer5.emacs_symlinks.doom]
name = "doom"
source = "{script_dir}/.doom.d"
target = "{home}/.config/doom"

[layer5.emacs_symlinks.light]
name = "emacs"
source = "{script_dir}/.emacs"
target = "{home}/.emacs"

# Layer 6: Symlinks and Shell
[layer6]
name = "Symlinks"

# {script_dir} = directory containing setup.py
# {home} = user's home directory
# {brew_prefix} = homebrew prefix (/opt/homebrew or /usr/local)
[[layer6.symlinks]]
name = "tools"
source = "{script_dir}"
target = "{home}/bin/tools"

[[layer6.symlinks]]
name = "clang-format"
source = "{script_dir}/.clang-format"
target = "{home}/.clang-format"

[[layer6.symlinks]]
